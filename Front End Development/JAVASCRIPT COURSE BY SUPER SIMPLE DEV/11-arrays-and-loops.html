      //Like Objects, arrays are references

      const array1 = [1, 2, 3]; //this list of values stores in the memory location, array1 contains the reference which points to that memory location.

      //if we make a copy of an array and store it in a constant, only the reference will be copied.
      //In other words, both constants array1 and array2 points to the same memory location.
      const array2 = array1;
      array2.push(4);
      console.log(array1);
      console.log(array2);

      const array3 = array1.slice(); //slice method is used to copy the values of an array instead of reference.
      console.log(array3);

      array3.push(5);
      console.log(array3);
      console.log(array1);
    
      //shortcut: Destructuring
      const [firstValue, secondValue] = [1, 2, 3];

      //How to Exit from a loop early using break and continue.
      
      for(let i=1; i<=10; i++){
        //We want to skip the value i=3, continue statement skip the rest of the loop statement for that iteration.   
        if(i%3==0){
          continue;
        }
        console.log(i);
        //When i=8, we want to stop.
        if(i==8){
          break;
        }
      }

      let i = 1;
      while(i<=10){
        if(i % 3 == 0){
          i++; //Do increment step manually when using continue in while loop.
          continue;

        }
        console.log(i);
        i++;
      }

      //How to use loops inside the function
      function doubleArray(nums){
        const numsDoubled = [];
        for(let index=0; index<nums.length; index++){
          //break the loop if the value in the array is 0.
          if(nums[index]==0){
            break;
          }
          numsDoubled[index] = nums[index] * 2;
        }
        return numsDoubled;
      }

      console.log(doubleArray([1, 1, 3]));
      console.log(doubleArray([2, 2, 5, 0]));
