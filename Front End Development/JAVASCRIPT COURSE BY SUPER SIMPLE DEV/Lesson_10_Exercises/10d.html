<!DOCTYPE html>
<html>
  <head>
    <title>
      Exercise_10-d
    </title>
    
    <style>
      
      .Gaming-button{
        background-color: black;
        color: white;
        border: none;
        padding-left: 15px;
        padding-right: 15px;
        padding-top: 10px;
        padding-bottom: 10px;
        font-family: Arial;
        border-radius: 5px;
        cursor: pointer;
      }

      .is-toggled{
        background-color: rgb(228, 227, 227);
        color: black;
      }
    </style>
  </head>
  <body>
    <button class="js-Gaming-button Gaming-button" onclick="
      const buttonElement = document.querySelector('.js-Gaming-button');
      if(!buttonElement.classList.contains('is-toggled')){
        buttonElement.classList.add('is-toggled');
      }
      else{
        buttonElement.classList.remove('is-toggled');
      }
    ">
     
      Gaming
    </button>
    
    <script>
      
          
    </script>
  </body>
</html>
