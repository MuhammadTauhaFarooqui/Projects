<!DOCTYPE html>
<html>
  <head>
    <title>
      Exercise_9-e
    </title>
  </head>
  <body>
    <input placeholder="Name" class="js-name-input"
      onkeydown="
        if (event.key === 'Enter') {
          process_input();
        }
      ">

    <button onclick="
      process_input();
    ">Submit</button>

    <p class="js-message"></p>
    
    <script>
      //Exercise_9-f
      function process_input(){
        const inputElement = document.querySelector('.js-name-input');
        document.querySelector('.js-message').innerHTML = `Your name is: ${inputElement.value}`;
      }
    </script>
  
  </body>
</html>
