<!DOCTYPE html>
<html>
  <head>
    <title>

    </title>

  <body>
    <input placeholder="Type something", class= "js-input", onkeyup=" // 'onkeyup' show input on webpage while typing
      const inputElement = document.querySelector('.js-input');
      document.querySelector('.js-message').innerHTML =  inputElement.value;
    ">
    
    <p class="js-message"></p>
    
  </body>
</html>
