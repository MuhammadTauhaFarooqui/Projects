<!DOCTYPE html>
<html>
  <head>
    <title>
      Exercise_9-g
    </title>
  </head>
  <body>
    
    <p>Amazon Shipping Calculator</p>
    
    <input placeholder="Cost of order" class="js-cost-input" onkeydown="
      handleCostKeydown(event);
    ">
    
    <button onclick="
      calculateTotal();
    ">Calculate</button>
    
    <p class="js-total-cost"></p>
    
    <script>
      function handleCostKeydown(event) {
        if (event.key === 'Enter') {
          calculateTotal();
        }
      }

      function calculateTotal() {
        const inputElement = document.querySelector('.js-cost-input');
        //by default when we get value from inputElement, it is string, we have to convert it to another type for performing computation.
        
        //Problem: Cost is inaccurate.
        //Solution: First convert the amount entered into cents, and after computation, convert it back to dollars.

        let cost = Number(inputElement.value) * 100; //cpoert it into cents. 

        
        if (cost < 4000) { //clicks, keydowns => events. onclick, onkeydown => event listeners.
          cost = cost + 1000;
        }

        document.querySelector('.js-total-cost')
          .innerHTML = `$${cost/100}`; //convert it back to dollars.
      }

    </script>
  </body>
</html>
