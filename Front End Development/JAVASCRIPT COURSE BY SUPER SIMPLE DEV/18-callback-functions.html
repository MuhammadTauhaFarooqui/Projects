<!DOCTYPE html>
<html>
  <head>
    <title>
      CallBack Functions
    </title>
  </head>
  <body>
    <h1>JavaScript Functions</h1>
    <h2>Function Sequence</h2>
    <h3>Callback function</h3>
    <p>JavaScript functions are executed in the sequence they are called.</p>
    
    <p id="demo"></p>
    <p>The result of the calculation is:</p>
    <p id="demo2"></p>
    <script>
      /*
      A CallBack is a function passed as an argument to another function.
      This technique allows a function to call another function.
      A callback function can execute after another function has finished.
      */
      //A normal Function Sequence
      //Javascript functions are executed in a sequence they are called.Not in the sequence they are defined.
      
      function myDisplayer(some){
        document.getElementById('demo').innerHTML = some;
      }
      
      
      function myFirst(){
        myDisplayer("Hello");
      }

      function mySecond(){
        myDisplayer("GoodBye");
      }
      
      mySecond();
      myFirst();

      /*
      SEQUENCE CONTROL
      Sometimes you would like to have better control over when to execute a function.
      */
      //Suppose you want to do a calculation, and then display the result.

      function myCalculator(num1, num2){
        let sum = num1 + num2;
        return sum;
      }

      let result = myCalculator(5, 5);
      myDisplayer(result);

      //we just want to call the calculator function and then want the calculator function to call the display function.
      function myCalculator(num1, num2){
        let sum = num1 + num2;
        myDisplayer(sum);
      }
      myCalculator(5, 5);

      //Using a callback function, you could call the calculator function with a callback and let the calculator function run the callback after the calculation is finished.
      
      function myDisplayerForCallbackfunction(value){ //myDisplayerForCallbackfunction is a callback function. It is passed to myCalculatorForCallBackFunction as an argument.
        document.getElementById("demo2").innerHTML = value;
      }
      
      function myCalculatorForCallBackFunction(num1, num2, myCallback){
        let sum = num1 + num2;
        myCallback(sum);
      }
      myCalculatorForCallBackFunction(50, 55, myDisplayerForCallbackfunction);

      //Example of callback function

      //create an array
      const myNumbers = [4, 1, -20, -7, 5, 9, -6];

      //Call removeNeg function with a callback function
      const posNumbers = removeNeg(myNumbers, (x)=> x >= 0);
      

      //Display result
      document.getElementById('demo').innerHTML = "Positive Numbers are: " + posNumbers;

      //creating function to keep only positive numbers
      function removeNeg(numbers, callback){
        const myArray = [];
        numbers.forEach((number)=>{
          if(callback(number)){
            myArray.push(number);
          }
        })
        return myArray;
      }


    </script>

  </body>
</html>
