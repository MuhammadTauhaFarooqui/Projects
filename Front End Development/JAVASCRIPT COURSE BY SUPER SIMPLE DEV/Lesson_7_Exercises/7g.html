<!DOCTYPE html>
<html>
  <head>
    <title>
      Exercise_7-g
    </title>
  </head>
  <body>
    <script>
      console.log(convertLength(50, 'miles', 'km'));
      console.log(convertLength(32, 'km', 'miles'));
      console.log(convertLength(50, 'km', 'km'));
      function convertLength(length, from, to){
        var result = 0;
        if(from=='km' && to=='miles'){
          result = length/1.6;
          return (`${result} miles`);
        }
        else if(from=='miles' && to=='km'){
          result = length * 1.6;
          return(`${result} km`);
        }
        else if(from=='km' && to=='km'){
          result = length;
          return(`${result} km`);
        }
      }
    </script>
  </body>
</html>
