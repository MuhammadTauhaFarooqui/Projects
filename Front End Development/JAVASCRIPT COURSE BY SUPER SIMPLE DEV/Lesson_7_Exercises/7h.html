<!DOCTYPE html>
<html>
  <head>
    <title>
      Exercise_7-h
    </title>
  </head>
  <body>
    <script>
      console.log(convertLength(5, 'miles', 'km'));
      console.log(convertLength(5, 'miles', 'ft'));
      console.log(convertLength(5, 'km', 'ft'));
      console.log(convertLength(5, 'lbs', 'lbs'));
      
      function convertLength(length, from, to){
        var result = 0;
        if(from=='km' && to=='miles'){
          result = length/1.6;
          return (`${result} miles`);
        }
        else if(from=='miles' && to=='km'){
          result = length * 1.6;
          return(`${result} km`);
        }
        else if(from=='km' && to=='km'){
          result = length;
          return(`${result} km`);
        }
        else if(from=='km' && to=='ft'){
          result = length * 3281;
          return(`${result} ft`);
        }
        else if(from=='ft' && to=='km'){
          result = length/3281;
          return(`${result} km`);
        }
        else if(from == 'miles' && to=='ft'){
          result = length*5280;
          return(`${result} ft`);
        }
        else if(from=='ft' && to=='miles'){
          result = length/5280;
          return(`${result} miles`)
        }
        else{ //Exercise_7-i
          return(`Invalid unit: ${from}`);
        }
      }
    </script>
  </body>
</html>
