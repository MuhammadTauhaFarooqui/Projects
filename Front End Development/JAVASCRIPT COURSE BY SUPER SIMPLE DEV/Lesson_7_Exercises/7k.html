<!DOCTYPE html>
<HTML>
  <HEAD>
    <TITLE>
      Ecercise_7-k
    </TITLE>
  </HEAD>
  <BODY>
    <p>Cart Quantity</p>
    <BUTTON onclick="
      console.log(`Cart Quantity: ${cartQuantity}`);  
    ">Show Quantity</BUTTON>
    
    <BUTTON onclick="
      updateCartQuantity(1)
    ">Add to Cart</BUTTON>
    
    <BUTTON onclick = "
      updateCartQuantity(2);
      
    ">+2</BUTTON>
    
    <BUTTON onclick="
      updateCartQuantity(3);
    ">+3</BUTTON>
    
    <BUTTON onclick = "
      updateCartQuantity(4);
    ">+4
    </BUTTON>
    
    <BUTTON onclick = "
      updateCartQuantity(5);
    ">+5
    </BUTTON>
    
    <BUTTON onclick = "
      updateCartQuantity(-1);
    ">Remove from cart</BUTTON>
    
    
    <BUTTON onclick = "
      updateCartQuantity(-2);
    ">
      -2
    </BUTTON>
    
    <BUTTON onclick="
      updateCartQuantity(-3);
    ">-3</BUTTON>
    
    
    
    <BUTTON onclick = "
      cartQuantity = 0;
      console.log('Cart was reset');
      console.log(`Cart Quantity: ${cartQuantity}`);
      
    ">Reset Cart</BUTTON>
    
    <SCRIPT>
      let cartQuantity = 0;   //camelcase Naming Convension, standard Naming Convension for javascript
      // let CartQuantity; PascalCase Naming
      // cart_quantity; snake_case(not use in javascript; used in other languages)

      //Update Cart Quantity function
      function updateCartQuantity(change){
        if(cartQuantity + change > 10){
          alert('The Cart is full');
        }
        else if(cartQuantity + change < 0){
          alert('Not enough items in the cart');
        }
        else{
          cartQuantity+=change;
          console.log(`Cart Quantity: ${cartQuantity}`);
        }
      }
    </SCRIPT>
  
  </BODY>
</HTML>
