    <h2>The then() Method</h2>
    <p>if 'resolve' execute in the producing code, 'then ' execute in the consuming code</p>
    <p>if 'reject' execute in the producing code, 'catch' execute in the consuming code.  </p>
    <p id="demo"></p>
    <script>
      /*
      "I promise a result"
      "Producing Code" is code that can take some time.( Creating a Promise)
      "Consuming Code" is code that must wait for the result.(Consuming the Promise)
      A Promise is an object that links the Producing code and Consuming code.

      //Example: Waiting for a file.
      //Using a callback

      function myDisplayer(value){document.getElementById('demo').innerHTML = value;}

      function getFile(mycallback){
        let req = new XMLHttpRequest();
        
        req.onload = function(){
          if(req.status == 200){
            mycallback(this.responseText);
          }
          else{
            mycallback("Error: " + req.status);
          }
        }
        req.open('GET', "17-classes.html");
        req.send();
      }
      getFile(myDisplayer);
