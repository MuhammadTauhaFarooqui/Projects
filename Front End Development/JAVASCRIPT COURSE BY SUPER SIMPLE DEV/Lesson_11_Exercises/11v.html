<!DOCTYPE html>
<html>
  <head>
    <title>
      Exercise_11-v
    </title>
  </head>
  <body>
    <script>
      for(let index=1; index<=20; index++){
        //console.log(index);
        if(index%5===0 && index%3===0){
          console.log('FizzBuzz');
        }
        else if(index%3 === 0){
          console.log('Fizz');
        }
        else if(index%5 === 0){
          console.log('Buzz');
        }
        
        else{
          console.log(index);
        }
        
      }
    </script>
  </body>
</html>
