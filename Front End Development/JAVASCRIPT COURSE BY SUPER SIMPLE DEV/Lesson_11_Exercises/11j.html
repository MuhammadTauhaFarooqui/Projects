<!DOCTYPE html>

  <body>
    <script>
      const first_array = [1, 2, 3, 4, 5];
      const second_array = [6, 7, 8, 9, 10];

      function addArray(array1, array2){
        const sum_array = [];
        for(let index=0; index<array1.length; index++){
          sum_array[index] = array1[index] + array2[index];
        }
        return sum_array;
      }

      console.log(addArray(first_array, second_array));
      console.log(addArray([1, 1, 2],[1, 1, 3]));
      console.log(addArray([1, 2, 3], [4, 5, 6]));
    </script>
  </body>
</html>
