<!DOCTYPE html>
<html>
  <head>
    <title>
      Exercise_11-r
    </title>
  </head>
  <body>
    <script>
      console.log(removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']));
      console.log(removeEgg(['egg', 'egg']));
      function removeEgg(foods){
        const result = [];
        let index = 0;
        while(index<foods.length){
          if(foods[index]=='egg'){
            index++;
            continue;
          }
          else{
            result.push(foods[index]);
            index++;
          }
        }
        return result;
      }
      
    </script>
  </body>
</html>
