  <body>
    <script>
      const foods = ['egg', 'apple', 'egg', 'egg', 'ham'];

      function removeEgg(foods){
        const food_replicate = foods.slice(); //To make a copy of the original array.
        const reverse_order_array = foods.reverse();
        const result = []
        let countofegg = 0;
        for(let index=0; index<foods.length; index++){
          if(reverse_order_array[index]==='egg' && countofegg<2){
            countofegg++;
            continue;
          }
          else{
            result.push(reverse_order_array[index]);
          }
        }
        console.log(food_replicate);
        console.log(result.reverse());

      }
      removeEgg(foods);
    </script>
  </body>
