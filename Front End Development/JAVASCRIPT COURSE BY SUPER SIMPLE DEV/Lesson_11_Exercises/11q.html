<!DOCTYPE html>
<html>

    </title>
  </head>
  <body>
    <script>
      function findIndex(array, word){
        for(let index=0; index<array.length; index++){
          if(array[index]==word){
            return index;
          }
        }
        return -1;
      }

      console.log(findIndex(['green', 'red', 'blue', 'red'], 'red'));
      console.log(findIndex(['green', 'red', 'blue', 'red'], 'yellow'));
    </script>
  </body>
</html>
