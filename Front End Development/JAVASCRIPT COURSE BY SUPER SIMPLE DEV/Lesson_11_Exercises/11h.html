  <body>
    <script>
      function addOne(array){
        let newarray1 = [];
        for(let index=0; index<array.length; index++){
          newarray1[index] = array[index] + 1;
        }
        return newarray1;
      }
      console.log(addOne([1, 2, 3]));
      console.log(addOne([-2, -1, 0, 99]));
    </script>
  </body>
