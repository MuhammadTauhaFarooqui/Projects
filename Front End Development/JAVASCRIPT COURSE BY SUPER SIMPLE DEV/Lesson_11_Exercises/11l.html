<!DOCTYPE html>
<html>

  <body>
    <script>
      function minMax(nums){
        const MinMaxinArray = {
          min: -2,
          max: 5
        };
        //for minimum value in the array
        MinMaxinArray.min = nums[0];
        for(let index=0; index<nums.length; index++){
          if(nums[index]<MinMaxinArray.min){
            MinMaxinArray.min = nums[index];
          }
        }
        //for maximum value in the array
        MinMaxinArray.max = nums[nums.length - 1];
        for(let index=0; index<nums.length; index++){
          if(nums[index]>MinMaxinArray.max){
            MinMaxinArray.max = nums[index];
          }
        }
        return MinMaxinArray;
      }
      
      console.log(minMax([1, -3, 5]));
      console.log(minMax([-2, 3, -5, 7, 10]));
    </script>
  </body>
</html>
