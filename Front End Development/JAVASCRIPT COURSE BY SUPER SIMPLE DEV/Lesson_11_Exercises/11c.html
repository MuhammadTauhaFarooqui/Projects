<!DOCTYPE html>
<html>

    <title>

    </title>
  </head>
  <body>
    <script>
      let array_1 = [1, 20, 22, 24, 5];

      function arraySwap(array){
        let swapped_array = [];
        const first_value = array[0]
        const temp = array[array.length - 1];
        swapped_array = array;
        swapped_array[swapped_array.length - 1] = first_value;
        swapped_array[0] = temp;
        return swapped_array;
      }

      console.log(arraySwap(array_1));
      console.log(arraySwap(['hi', 'hello', 'good']));
    </script>
  </body>
</html>
