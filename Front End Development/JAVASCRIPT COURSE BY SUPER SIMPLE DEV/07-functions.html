<!DOCTYPE html>
<html>
  <head>
    <title>
      FUNCTIONS
    </title>
  </head>
  <body>
    <!-- What is a Function ?
      A function provide us resuseability of code.
      We create a function by using keyword 'function'.
    -->
    <script>
      /*
      function function1(){
        console.log('hello');
        console.log(2 + 2);
      }

      // calling a function
      function1();
      */

      function calculateTax() {
        console.log(1000 * 0.1); 
      }
      
      calculateTax();
      /*
      Parameter is a value passed into a function
      */
      function calculateTax_with_Parameter(cost){ //cost is parameter
        console.log(cost * 0.1);
      }

      calculateTax_with_Parameter(2000); //2000 is a argument
      calculateTax_with_Parameter(5000);
    
      //function with multiple parameters
      function calculateTax(cost, taxPercent = 0.1) { //0.1 is the default value for the taxPercent parameter.
        console.log(taxPercent);
        console.log(cost * taxPercent);
      }
    
      calculateTax(2000, 0.2);
      calculateTax(5000); // executes with the default value for parameter taxPercent 
    </script>
  </body>
</html>
