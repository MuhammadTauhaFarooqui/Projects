<!DOCTYPE html>
<html>
  <head>
    <title>
      Exercise_8-j
    </title>
  </head>
  <body>
    
    <button onclick = "
      playgame('heads');
    ">
      heads
    </button>

    <button onclick = "
      playgame('tails');
    ">
      tails
    </button>
    
    <script>

      const score = {
        wins: 0,
        losses: 0
      };
      
      function playgame(guess){
        const randomnumber = Math.random();
        let result = '';
        if(randomnumber<0.5){
          result = 'heads';
        }
        else{
          result = 'tails';
        }
        if(guess == result){
          console.log('You win');
          score.wins+=1;
          console.log(`Wins: ${score.wins}, Loses: ${score.losses}`);
        }
        else{
          console.log('You lose'); 
          score.losses+=1;
          console.log(`Wins: ${score.wins}, Loses: ${score.losses}`);
        }
      }
    </script>
  </body>
</html>
