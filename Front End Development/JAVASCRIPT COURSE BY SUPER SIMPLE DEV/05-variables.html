<!DOCTYPE html>
<html>
  <head>

    <title>
      Variables
    </title>
  </head>
  <body>
    <script>
      /*
      What is a variable?
      A varible is a container which stores a value like number or a string to use it later.  
    */
    // initialize a variable
    // The keyword "let" creates a new variable.
    // ";" indicates the end of an instruction.
    let variable1 = 3; 
    console.log(variable1);  
    
    let calculation = 2 + 2;
    console.log(calculation);
    console.log(calculation + 2); //we can use a variable  whereever we use a value.
    
    let result = calculation + 2; 
    console.log(result);
    
    let message = 'hello';
    console.log(message); console.log(';');
    console.log('semicolon verification') //
    
    //javascript automatically add semicolon at the end of instruction but it is not best practise.
    console.log('statement without semicolon')
    
    //reassigning value to a variable
    variable1 = 5;
    console.log(variable1);

    variable1 = variable1 + 1;
    console.log(variable1);

    //Another method to assign a value is to use keyword "const".
    //The difference between constant and variable is that the value of constant can't be changed.
    
    const variable2 = 3;
    //variable2 = 5; //this statement will cause an error.
    
    //another way to create a variable is by using keyword "var".

    var variable3 = 3;
    </script>
    
  </body>
</html>
