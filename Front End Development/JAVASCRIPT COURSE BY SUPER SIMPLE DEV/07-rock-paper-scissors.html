<!DOCTYPE html>
  <html>
    <head>
      <title>
        Lesson_7_Rock-Paper-Scissors
      </title>
    </head>
    <body>
      <p>Rock Paper Scissors</p>

      <button onclick = "
        playGame('rock');
      ">Rock</button>
      
      <button onclick="
        playGame('paper');  
      ">Paper</button>
      
      <button onclick = "
        playGame('scissors');
      ">
      Scissors</button>
      
      <script>

        function playGame(playerMove){
          const computerMove = pickComputerMove();
        
          result = '';

          if(playerMove=='scissors'){
            if(computerMove == 'rock'){
              result = 'You lose.';
            }
            else if(computerMove == 'paper'){
              result = 'You win.'; 
            }
            else if(computerMove == 'scissors'){
              result = 'Tie.';
            }
          }
          
          else if(playerMove=='paper'){
            if(computerMove == 'rock'){
              result = 'You win.';
            }
            else if(computerMove == 'paper'){
              result = 'Tie.';
            }
            else if(computerMove == 'scissors'){
              result = 'You lose.';
            }
      
          }
          
          else if(playerMove=='rock'){
            if(computerMove == 'rock'){
              result = 'Tie.';
            }
            else if(computerMove == 'paper'){
              result = 'You lose.';
            }
            else if(computerMove == 'scissors'){
              result = 'You win.';
            }
          }
              
        
          alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}`);

        }
        
        function pickComputerMove() {
          randomNumber = Math.random(); //Math.random() function generates a random number between 0 and 1
          let computerMove = ''; 
          
          if(randomNumber >= 0 && randomNumber < 1 / 3){
            computerMove = 'rock';
          }

          if(randomNumber >= 1 / 3 && randomNumber < 2 / 3){
            computerMove = 'paper';
          }

          if(randomNumber >= 2 / 3 && randomNumber < 1){
            computerMove = 'scissors';
              
          }
          //empty return statement returns undefined.
          return computerMove; 
        }
      </script>
    </body>

  </html>
