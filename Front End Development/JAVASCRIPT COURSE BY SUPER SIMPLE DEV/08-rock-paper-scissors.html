<!DOCTYPE html>
  <html>
    <head>
      <title>
        Lesson_8_Rock-Paper-Scissors
      </title>
    </head>
    <body>
      <p>Rock Paper Scissors</p>

      <button onclick = "
        playGame('rock');
      ">Rock</button>
      
      <button onclick="
        playGame('paper');  
      ">Paper</button>
      
      <button onclick = "
        playGame('scissors');
      ">
      Scissors</button>
      
      <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.tie = 0;
      ">
        Reset Score
      </button>
      
      <script>
        //we will add a score to the rock paper scissor game.
        const score = JSON.parse(localStorage.getItem('score')) //creating score object
        
        
        
        //console.log(localStorage.getItem('score'));
        
        function playGame(playerMove){
          const computerMove = pickComputerMove();
        
          result = '';

          if(playerMove=='scissors'){
            if(computerMove == 'rock'){
              result = 'You lose.';
            }
            else if(computerMove == 'paper'){
              result = 'You win.'; 
            }
            else if(computerMove == 'scissors'){
              result = 'Tie.';
            }
          }
          
          else if(playerMove=='paper'){
            if(computerMove == 'rock'){
              result = 'You win.';
            }
            else if(computerMove == 'paper'){
              result = 'Tie.';
            }
            else if(computerMove == 'scissors'){
              result = 'You lose.';
            }
      
          }
          
          else if(playerMove=='rock'){
            if(computerMove == 'rock'){
              result = 'Tie.';
            }
            else if(computerMove == 'paper'){
              result = 'You lose.';
            }
            else if(computerMove == 'scissors'){
              result = 'You win.';
            }
          }

          if(result == 'You win.'){
            score.wins+=1;
          }
          else if(result == 'You lose.'){
            score.losses+=1;
          }
          else{
            score.tie+=1;
          }
          //since local Storage only takes strings, we have to convert score object into string using JSON.    
          localStorage.setItem('score', JSON.stringify(score));
        
          alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}
Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.tie}`);

        }
        
        function pickComputerMove() {
          randomNumber = Math.random(); //Math.random() function generates a random number between 0 and 1
          let computerMove = ''; 
          
          if(randomNumber >= 0 && randomNumber < 1 / 3){
            computerMove = 'rock';
          }

          if(randomNumber >= 1 / 3 && randomNumber < 2 / 3){
            computerMove = 'paper';
          }

          if(randomNumber >= 2 / 3 && randomNumber < 1){
            computerMove = 'scissors';
              
          }
          //empty return statement returns undefined.
          return computerMove; 
        }
      </script>
    </body>

  </html>
