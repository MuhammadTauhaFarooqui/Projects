<!DOCTYPE html>
<html>
  <head>
    <title>Exercise_12-l</title>
  </head>
  <body>
    <script>
      
      const countPositive = (nums) =>{
        let countofPositive = 0;
        nums.forEach((value, index)=>{
          if(value>=0){
            countofPositive++;
          }
          else{
            return;
          }
        });
        return countofPositive;
      };
      console.log(countPositive([1, -3, 5]));
      console.log(countPositive([-2, 3, -5, 7, 10]));
    </script>
  </body>
</html>
