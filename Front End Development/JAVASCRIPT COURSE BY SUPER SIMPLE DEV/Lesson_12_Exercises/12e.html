<!DOCTYPE html>
<html>
  <head>
    <title>
      Exercise_12-e
    </title>
  </head>
  <body>
    <button class="add-to-cart-button">
      Add to Cart
    </button>
    <p class="button-text"></p>
    <script>
      document.querySelector('.add-to-cart-button').addEventListener('click', () => {
        document.querySelector('.button-text').innerHTML = 'Added';      
        setTimeout(()=>{
        document.querySelector('.button-text').innerHTML = '';
      }, 2000);
      });
    </script>
  </body>
</html>
