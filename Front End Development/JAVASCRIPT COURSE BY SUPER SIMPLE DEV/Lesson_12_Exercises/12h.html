<!DOCTYPE html>
<html>
  <head>
    <title>
      Exercise_12-h
    </title>
  </head>
  <body>
    <button class="Add-button">
      Add
    </button>
    
    <button class="Remove-button">
      Remove
    </button>
    
    <script>
      document.querySelector('.Add-button').addEventListener('click', () => {message++;});
      document.querySelector('.Remove-button').addEventListener('click', () => {message--;});
      let message = 2;
      setInterval(()=> {
        if(document.title == "App"){
          document.title = `(${message}) New messages`;
        }
        else{
          document.title = 'App';
        }

      }, 1000);
      
      
    </script>
  </body>
</html>
