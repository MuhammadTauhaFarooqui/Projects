<!DOCTYPE html>

  <body>
    <script>
      const removeEggs = function (array){
        return array.filter((value) => {
          if(value==='egg'){
            return false;
          }
          else{
            return true;
          }
        });
      };

      console.log(removeEggs(['egg', 'apple', 'egg', 'egg', 'ham']));
      console.log(removeEggs(['apple', 'egg', 'mango', 'banana', 'egg']));
    </script>
  </body>
</html>
