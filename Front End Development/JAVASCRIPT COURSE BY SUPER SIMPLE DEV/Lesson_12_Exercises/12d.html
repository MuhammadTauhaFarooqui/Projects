<!DOCTYPE html>
<html>
  <head>
    <title>
      Exercise_12-d
    </title>
  </head>
  <body>
    <button class="start-button">
      Start
    </button>
    <script>
      document.querySelector('.start-button').addEventListener
      ('click', ()=>{
        document.querySelector('.start-button').innerHTML = 'Loading!';
        setTimeout(() => {
          document.querySelector('.start-button').innerHTML = 'Finished!';
        }, 1000);
      });
    </script>
  </body>
</html>
