<!DOCTYPE html>
<html>
  <head>
    <title>
      Asynchronous Javascript
    </title>
  </head>
  <body>
    <h1>JavaScript Functions</h1>
    <p id="demo"></p>
    <h2>Asynchronous Functions</h2>
    <script>
      /*
      Functions running in parallel with other functions are known as asynchronous function.
      A good example of asynchronous functions are setTimeout().
      */
      
      //Example of callback function.
      //In this example, myDisplayer is a callback function which is passed as an argument to the myCalculator function.

      function myDisplayer(value){
        document.getElementById('demo').innerHTML = value;
      }

      function myCalculator(num1, num2, callback){
        let sum = num1 + num2;
        callback(sum);
      }

      myCalculator(5, 5, myDisplayer);
    
    //Generally, callbacks are used with asynchronous function.
    
    //Example
    //When using a settimeout function, a call back function can be specified to be executed on time-out.

    setTimeout(myfunction, 3000);
    
    function myfunction(){
      document.getElementById('demo').innerHTML = "set time out executed"
    }
    
    //Instead of passing the name of the callback function, whole function can be passed.
    //function(){myfunction("Death is only a beginning");} is passed as a callback.

    setTimeout(function(){myfunction("Death is only a beginning");}, 3000);
    
    function myfunction(value){
      document.getElementById('demo').innerHTML = value;
    }
    
    //specify a callback function to be executed for each interval.
    setInterval(()=>{
      let d = new Date();
      document.getElementById('demo').innerHTML = d.getHours() + ":" + d.getMinutes() + ":" + d.getSeconds();
    }, 1000);
    </script>
  </body>
</html>
